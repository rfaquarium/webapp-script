<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RF Workspace Pro</title>
   
    <!-- KHAI BÁO PWA - FULL SCREEN -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Cấu hình riêng cho iOS (iPhone/iPad) - Full screen mode -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RF Workspace Pro">
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
        }
        .app-container { 
            position: relative; 
            width: 100%; 
            height: 100vh; 
            overflow: hidden; 
        }
        .app-container iframe {
            position: absolute;
            top: -50px; 
            left: 0;
            width: 100%;
            height: calc(100% + 50px);
            border: none;
        }
        
        /* Ẩn thanh địa chỉ khi ở chế độ PWA */
        @media all and (display-mode: fullscreen), (display-mode: standalone) {
            .app-container {
                height: 100vh;
                height: 100dvh;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <iframe src="https://script.google.com/macros/s/AKfycbytd9c_FzcqJ_65nqNI-xplYVRD3gstZcIL6PBk34P81XdSqXTNcRWsYt5bbeqjg66N/exec" 
                allow="fullscreen; clipboard-write; encrypted-media"
                allowfullscreen></iframe>
    </div>
    
    <!-- ĐĂNG KÝ SERVICE WORKER (AN TOÀN - TRÁNH LỖI SANDBOX) -->
    <script>
        // Đăng ký Service Worker an toàn, tránh lỗi SecurityError khi trang nằm trong iframe sandbox
        try {
            if ('serviceWorker' in navigator) {
                // Chỉ đăng ký khi ở môi trường an toàn (HTTPS, localhost, hoặc 127.0.0.1)
                const isSecureContext = location.protocol === 'https:' || 
                                       location.hostname === 'localhost' || 
                                       location.hostname === '127.0.0.1';
                
                if (isSecureContext) {
                    navigator.serviceWorker.register('sw.js')
                        .then(() => console.log('%c[RF Workspace] Service Worker Registered', 'color:#4CAF50'))
                        .catch(err => console.warn('[RF Workspace] SW registration failed:', err.message));
                } else {
                    console.log('%c[RF Workspace] Service Worker bị tắt (không phải môi trường an toàn)', 'color:#FF9800');
                }
            }
        } catch (e) {
            // Bắt lỗi SecurityError khi context bị sandbox (iframe thiếu allow-same-origin)
            console.warn('%c[RF Workspace] Service Worker không khả dụng do sandbox/iframe:', 'color:#f44336', e.message);
        }
        
        // Tự động ẩn thanh địa chỉ trên một số trình duyệt mobile (hỗ trợ thêm)
        if (window.navigator.standalone === false) {
            // Nếu đang ở trình duyệt thường, có thể scroll nhẹ để ẩn address bar (tùy chọn)
            setTimeout(() => {
                window.scrollTo(0, 1);
            }, 100);
        }
    </script>
</body>
</html>
